services:
  auth_db:
    image: postgres:16
    environment:
      POSTGRES_DB: authDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authDB"]
      interval: 5s
      timeout: 5s
      retries: 5

  chat_db:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - chat_db_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.runCommand({ ping: 1 }).ok\""]
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    build:
      context: ./auth-service
    ports:
      - "8000:8000"
    env_file:
      - ./auth-service/.env
    depends_on:
      auth_db:
        condition: service_healthy
    volumes:
      - ./auth-service:/app
    command: >
      sh -c "set -e;
      uv run alembic upgrade head;
      exec uv run uvicorn src.main:app --host 0.0.0.0 --port 8000"

  chat:
    build:
      context: ./chat-service
    ports:
      - "8001:8000"
    env_file:
      - ./chat-service/.env
    depends_on:
      chat_db:
        condition: service_healthy
    volumes:
      - ./chat-service:/app
    command: >
      sh -c "set -e;
      exec uv run uvicorn src.main:app --host 0.0.0.0 --port 8000"

volumes:
  auth_db_data:
  chat_db_data: