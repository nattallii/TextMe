replicaCount: 1

image:
  repository: natalii571/chat-service
  tag: latest

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

config:
  LOG_LEVEL: info
  JWT_ALGORITHM: HS256
  MONGO_DB: chatDB

secret:
  MONGO_URL: mongodb://root:password@chat-mongo-chart:27017/chatDB?authSource=admin
  JWT_SECRET_KEY: SUPER_PUPER_SECRET

database:
  postgres:
    enabled: false
  mongo:
    enabled: true
    persistence:
      enabled: true
      storageClass: gp2
      size: 1Gi

mongo-chart:
  name: chat-db
  database: chatDB
  port: 27017


migration:
  enabled: false

ingress:
  enabled: true
  paths:
    - path: /chat
      pathType: Prefix
      servicePort: 8000