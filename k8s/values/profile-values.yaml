replicaCount: 1

image:
  repository: natalii571/textme-profile-service
  tag: latest

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

config:
  LOG_LEVEL: info
  JWT_ALGORITHM: HS256

secret:
  DATABASE_URL: postgresql+asyncpg://postgres:password@profile-postgres-chart:5432/profileDB
  JWT_SECRET_KEY: SUPER_PUPER_SECRET

database:
  postgres:
    enabled: true
  mongo:
    enabled: false

postgres-chart:
  postgres:
    user: postgres
    password: password
    db: profileDB

  persistence:
    accessMode: ReadWriteOnce
    storageClass: gp2
    size: 1Gi

migration:
  enabled: true



ingress:
  enabled: true
  paths:
    - path: /profile(/|$)(.*)
      pathType: ImplementationSpecific
      servicePort: 8000