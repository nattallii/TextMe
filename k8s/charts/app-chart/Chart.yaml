apiVersion: v2
name: app-chart
description: Universal chart for microservices
type: application
version: 0.1.0
appVersion: "1.0.0"


dependencies:
  - name: postgres-chart
    version: "1.0.0"
    repository: "file://../postgres-chart"
    condition: database.postgres.enabled

  - name: mongo-chart
    version: "1.0.0"
    repository: "file://../mongo-chart"
    condition: database.mongo.enabled