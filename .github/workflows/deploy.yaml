name: Deploy to EKS

on:
  workflow_run:
    workflows: ["Build & Push Images"]
    types:
      - completed
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  EKS_CLUSTER_NAME: textme-cluster

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"

      - name: Check cluster access
        run: kubectl get nodes

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install Helmfile
        run: |
          HELMFILE_VERSION=0.168.0
          curl -L "https://github.com/helmfile/helmfile/releases/download/v${HELMFILE_VERSION}/helmfile_${HELMFILE_VERSION}_linux_amd64.tar.gz" -o helmfile.tar.gz
          tar -xzf helmfile.tar.gz
          sudo mv helmfile /usr/local/bin/helmfile
          helmfile --version

      - name: Create namespace if missing
        run: kubectl create namespace textme --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helmfile
        run: helmfile apply